# DigitalOcean App Platform Specification
# This file defines the backend service, a migration job, and a database.
# Note: You can also add your frontend (apps/web) here if you choose to move it from Netlify.

name: slabhub
region: fra # Frankfurt (можно изменить на нужный)
services:
  - name: api
    instance_count: 1
    instance_size_slug: basic-xxs # Самый дешевый тариф ($5/mo)
    
    # Используем Dockerfile вместо buildpack
    dockerfile_path: Dockerfile
    source_dir: /
    
    http_port: 3001
    
    # Переменные окружения
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${slabhub-db.DATABASE_URL}
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: JUSTTCG_BASE_URL
        scope: RUN_TIME
        value: "https://api.justtcg.com"
      - key: JUSTTCG_API_KEY
        scope: RUN_TIME
        value: "tcg_88a04d470df642e99c954c46ecb7802b,tcg_f16b30a697814f7fac8443f9093d60b9,tcg_20e148e2a10945a7a544e3f47548e056,tcg_d49551a8d3d14829a7e015eb5e61646b,tcg_93a952ce08364765b2e25c7bbbd95038"
      - key: PSA_API_TOKEN
        scope: RUN_TIME
        value: "fWCNL1ZHsDN-8CebFL5PgnF3L1tTk6buv1oagaXNb1iLBF_TiYAOICC4CkOaJFAxxIOILDXmedQIVTa3BaPnYHAkf-AvQ6nkwP9uuLqvSzUJgZmzCLjlQzDIX3iKyuBswnPUMUjL523DozZwXOobIJi1GTXtWisRJKbrkDaGPMZDexj51NaINEBvNfOAbGGNI3kmM5dGs1vU7GKmuuKiNlWtmH0DTBLDI-Rlf0jrL3Ibi35Cbw2MestmrA1pOLVfmS1cGBGdThnfqJYdHcB-cEDaHUtG3Q699yHcZbE_Vkp-DP5M"
      - key: NPM_CONFIG_PRODUCTION
        scope: BUILD_TIME
        value: "false"
      - key: SKIP_NODE_BUILD_SCRIPT
        scope: BUILD_TIME
        value: "true"

jobs:
  - name: migration-job
    kind: PRE_DEPLOY
    instance_count: 1
    instance_size_slug: basic-xxs
    
    # Используем тот же Dockerfile
    dockerfile_path: Dockerfile
    source_dir: /
    
    # Переопределяем команду для выполнения миграций
    run_command: npx prisma migrate deploy
    
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${slabhub-db.DATABASE_URL}

databases:
  - name: slabhub-db
    engine: PG
    version: "17"
    production: false # Установите true для выделенного кластера в продакшене
    num_nodes: 1
    allow_remote_access: true
    size_slug: db-s-dev-database # База для разработки (~$7/mo)
