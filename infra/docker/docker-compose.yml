services:
  postgres:
    image: postgres:16-alpine
    container_name: slabhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: slabhub
    ports:
      - '5432:5432'
    volumes:
      - slabhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  slabhub_pgdata:
    driver: local
