[build]
  command = "pnpm --filter @slabhub/web run build"
  publish = "apps/web/out"

[[redirects]]
  from = "/api/*"
  to = "https://slabhub-prod-yinjg.ondigitalocean.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "/api"
