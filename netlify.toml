[build]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://slabhub-dev-kksal.ondigitalocean.app"

[[redirects]]
  from = "/api/*"
  to = "https://slabhub-dev-kksal.ondigitalocean.app/:splat"
  status = 200
  force = true
